services:
  messageviewer:
    # Use pre-built image from GitHub Container Registry
    # For local development, comment out 'image' and uncomment 'build: .' below
    image: ghcr.io/nickysqueekz/messageviewer:stable
    # build: .
    container_name: messageviewer
    ports:
      - "8081:8081"
    volumes:
      # Mount data directory for persistent database storage
      - ./data:/data
    environment:
      - PORT=8081
      - DB_PATH_PREFIX=/data
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
    networks:
      - messageviewer_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  messageviewer_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
